<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>自由ZINE · 封面</title>
    <link rel="stylesheet" href="./style2.css" />
  </head>
  <body>
    <div id="bookLoader" class="app-loader" aria-busy="true" aria-hidden="false">
      <div class="app-loader-inner">
        <div class="app-loader-ring" aria-hidden="true"></div>
        <div id="bookLoaderText" class="app-loader-text">加载封面…</div>
      </div>
    </div>

    <div class="book-landing">
      <div id="bookCoverWrap" class="book-cover-wrap is-loading">
        <img id="bookCoverImg" class="book-cover" alt="ZINE 封面" />
      </div>
      <div class="book-actions">
        <button id="bookReadBtn" class="circle-btn primary">阅览</button>
      </div>
      <div id="bookHint" class="book-hint"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
    <script src="./book.js"></script>
  </body>
</html>
